global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'stock_system_api'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'stock_system_agents'
    static_configs:
      - targets: ['data_agent:8000', 'technical_agent:8000', 'risk_agent:8000', 'trade_agent:8000', 'strategy_agent:8000']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15672']

  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']