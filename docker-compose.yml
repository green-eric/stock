version: '3.8'

services:
  # 数据存储服务
  redis:
    image: redis:7.0-alpine
    container_name: stock_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:14-alpine
    container_name: stock_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=stock_system
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 消息队列服务
  rabbitmq:
    image: rabbitmq:3.10-alpine
    container_name: stock_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: unless-stopped

  # 监控服务
  prometheus:
    image: prom/prometheus:latest
    container_name: stock_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: stock_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  # 日志服务
  elasticsearch:
    image: elasticsearch:8.0.0
    container_name: stock_elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: kibana:8.0.0
    container_name: stock_kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # 应用服务
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: stock_api
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stock_system
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./api:/app/api
      - ./agents:/app/agents
      - ./data:/app/data
    restart: unless-stopped

  # Agent服务
  data_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: stock_data_agent
    command: python -m agents.data_agent
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stock_system
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./agents:/app/agents
      - ./data:/app/data
    restart: unless-stopped

  technical_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: stock_technical_agent
    command: python -m agents.technical_agent
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stock_system
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./agents:/app/agents
      - ./data:/app/data
    restart: unless-stopped

  risk_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: stock_risk_agent
    command: python -m agents.risk_agent
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stock_system
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./agents:/app/agents
      - ./data:/app/data
    restart: unless-stopped

  trade_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: stock_trade_agent
    command: python -m agents.trade_agent
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stock_system
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./agents:/app/agents
      - ./data:/app/data
    restart: unless-stopped

  strategy_agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: stock_strategy_agent
    command: python -m agents.strategy_agent
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stock_system
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./agents:/app/agents
      - ./data:/app/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  grafana_data:
  es_data: